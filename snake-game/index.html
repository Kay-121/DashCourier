<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokia Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="phone-frame">
            <div class="screen">
                <div class="game-header">
                    <span class="score">Score: <span id="score">0</span></span>
                    <span class="speed">Lvl: <span id="speed">1</span></span>
                    <span class="high-score">Hi: <span id="highScore">0</span></span>
                </div>
                <canvas id="gameCanvas" width="280" height="200"></canvas>
                <div class="game-footer">
                    <span id="status">Press START</span>
                </div>
            </div>
            <div class="keypad">
                <div class="nav-keys">
                    <button class="key" id="btnUp">&#9650;</button>
                    <div class="nav-middle">
                        <button class="key" id="btnLeft">&#9664;</button>
                        <button class="key" id="btnCenter">OK</button>
                        <button class="key" id="btnRight">&#9654;</button>
                    </div>
                    <button class="key" id="btnDown">&#9660;</button>
                </div>
            </div>
        </div>
        <div class="instructions">
            <p>Use arrow keys or buttons to move</p>
            <p>Press SPACE or OK to start/pause</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
